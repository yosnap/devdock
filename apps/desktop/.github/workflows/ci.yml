name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: devdock/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsecret-1-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './devdock/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: devdock
        run: npm ci

      - name: TypeScript check
        working-directory: devdock
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: devdock
        run: npm test -- --run

      - name: Rust tests
        working-directory: devdock/src-tauri
        run: cargo test --lib
